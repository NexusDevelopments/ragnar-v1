<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>Ragnar</title>
    <style>
      body {
        margin: 0;
      }

      #fallback {
        min-height: 100vh;
        position: relative;
        overflow: hidden;
        color: #fff0f0;
        font-family: "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% 22%, rgba(200, 30, 30, 0.13), transparent 38%),
          radial-gradient(circle at 78% 76%, rgba(160, 10, 10, 0.12), transparent 40%),
          linear-gradient(180deg, #050505, #0d0202);
      }

      .fallback-rail {
        position: fixed;
        top: 60px;
        left: 0;
        bottom: 0;
        width: 62px;
        border-right: 1px solid rgba(255, 80, 80, 0.14);
        background: linear-gradient(180deg, rgba(14, 4, 4, 0.72), rgba(8, 2, 2, 0.85));
        display: grid;
        justify-items: center;
        grid-template-rows: auto 1fr;
        padding: 18px 0 16px;
      }

      .fallback-rail-logo {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        color: #ff6060;
        background: linear-gradient(160deg, rgba(180, 30, 30, 0.3), rgba(80, 8, 8, 0.4));
        border: 1px solid rgba(255, 90, 90, 0.42);
        box-shadow: 0 0 14px rgba(200, 30, 30, 0.35);
      }

      .fallback-rail-logo svg {
        width: 18px;
        height: 18px;
      }

      .fallback-rail-nav {
        margin-top: 28px;
        display: grid;
        align-content: start;
        gap: 6px;
        width: 100%;
        padding: 0 10px;
      }

      .fallback-rail-link {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        color: rgba(255, 175, 175, 0.7);
        border: 1px solid transparent;
        background: transparent;
      }

      .fallback-rail-link svg {
        width: 20px;
        height: 20px;
      }

      .fallback-center {
        min-height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
        transform: translateY(-28px);
        padding: 20px;
      }

      .fallback-title {
        margin: 0;
        font-size: clamp(2.4rem, 7.2vw, 4.2rem);
        color: #fff0f0;
        text-shadow: 0 0 10px rgba(255, 110, 110, 0.5), 0 0 32px rgba(200, 30, 30, 0.35);
      }

      .fallback-subtitle {
        margin: 12px 0 0;
        color: rgba(255, 220, 220, 0.72);
      }

      .fallback-legal {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        color: rgba(255, 185, 185, 0.38);
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <div id="fallback">
      <aside class="fallback-rail" aria-hidden="true">
        <div class="fallback-rail-logo">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/></svg>
        </div>
        <div class="fallback-rail-nav">
          <div class="fallback-rail-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.75L12 3l9 6.75V21a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.75z"/><path d="M9 22V12h6v10"/></svg>
          </div>
          <div class="fallback-rail-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </div>
          <div class="fallback-rail-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </div>
          <div class="fallback-rail-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          </div>
          <div class="fallback-rail-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </div>
        </div>
      </aside>

      <main class="fallback-center">
        <div>
          <h1 class="fallback-title">Ragnar</h1>
          <p class="fallback-subtitle">Fast • Sleek • Unlimited Access</p>
        </div>
      </main>

      <footer class="fallback-legal">
        <span>DMCA</span>
        <span>•</span>
        <span>Terms of Service</span>
      </footer>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener("ragnar:app-ready", () => {
        const fallback = document.getElementById("fallback");
        if (fallback) {
          fallback.style.display = "none";
        }
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
