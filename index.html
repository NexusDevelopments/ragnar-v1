<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>Ragnar</title>
    <style>
      body { margin: 0; }

      #fallback {
        min-height: 100vh;
        position: relative;
        overflow: hidden;
        color: #fff0f0;
        font-family: "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% 22%, rgba(190,28,28,0.12), transparent 38%),
          radial-gradient(circle at 78% 76%, rgba(140,8,8,0.1), transparent 40%),
          linear-gradient(180deg, #060606, #0a0101);
      }

      .fallback-rail {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: 168px;
        border-right: 1px solid rgba(255,68,68,0.12);
        background: rgba(10,3,3,0.94);
        display: flex;
        flex-direction: column;
        padding: 20px 0 24px;
      }

      .fallback-rail-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 18px 20px;
        color: #ff7070;
        font-weight: 800;
        font-size: 1.08rem;
        letter-spacing: 0.05em;
        border-bottom: 1px solid rgba(255,68,68,0.1);
        margin-bottom: 12px;
        text-decoration: none;
      }

      .fallback-rail-logo svg {
        flex-shrink: 0;
        filter: drop-shadow(0 0 6px rgba(230,50,50,0.65));
      }

      .fallback-rail-nav {
        display: flex;
        flex-direction: column;
        gap: 3px;
        padding: 0 10px;
      }

      .fallback-rail-link {
        display: flex;
        align-items: center;
        gap: 13px;
        padding: 12px 14px;
        border-radius: 10px;
        color: rgba(230,195,195,0.82);
        font-size: 0.95rem;
        font-weight: 500;
        border: 1px solid transparent;
        text-decoration: none;
      }

      .fallback-rail-link.active {
        color: #ffb8b8;
        background: rgba(190,28,28,0.2);
        border-color: rgba(230,60,60,0.28);
        box-shadow: inset 3px 0 0 #e03535;
      }

      .fallback-rail-link svg {
        width: 22px;
        height: 22px;
        flex-shrink: 0;
      }

      .fallback-rail-label {
        white-space: nowrap;
      }

      .fallback-center {
        min-height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
        padding-left: 168px;
      }

      .fallback-title {
        margin: 0;
        font-size: clamp(2.6rem, 7vw, 4.6rem);
        font-weight: 800;
        color: #fff4f4;
        text-shadow: 0 0 14px rgba(255,120,120,0.55), 0 0 42px rgba(200,30,30,0.35);
        transform: translateY(-28px);
      }

      .fallback-subtitle {
        margin: 14px 0 0;
        color: rgba(255,218,218,0.7);
        letter-spacing: 0.06em;
        transform: translateY(-28px);
      }

      .fallback-legal {
        position: fixed;
        bottom: 22px;
        left: calc(50% + 84px);
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        color: rgba(255,185,185,0.34);
        font-size: 0.78rem;
      }
    </style>
  </head>
  <body>
    <div id="fallback">
      <aside class="fallback-rail" aria-hidden="true">
        <div class="fallback-rail-logo">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/></svg>
          <span>Ragnar</span>
        </div>
        <nav class="fallback-rail-nav">
          <a class="fallback-rail-link active" href="#">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.75L12 3l9 6.75V21a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.75z"/><path d="M9 22V12h6v10"/></svg>
            <span class="fallback-rail-label">Home</span>
          </a>
          <a class="fallback-rail-link" href="#">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="4"/><path d="M6 12h4M8 10v4"/><circle cx="15" cy="11" r="1" fill="currentColor" stroke="none"/><circle cx="18" cy="13" r="1" fill="currentColor" stroke="none"/></svg>
            <span class="fallback-rail-label">Games</span>
          </a>
          <a class="fallback-rail-link" href="#">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3"/><circle cx="9" cy="10" r="1.5"/><circle cx="15" cy="10" r="1.5"/><path d="M8 15s1 2 4 2 4-2 4-2"/><path d="M9 4V2M15 4V2"/></svg>
            <span class="fallback-rail-label">AI</span>
          </a>
          <a class="fallback-rail-link" href="#">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 1 0 20A14.5 14.5 0 0 1 12 2"/><path d="M2 12h20"/></svg>
            <span class="fallback-rail-label">Browse</span>
          </a>
          <a class="fallback-rail-link" href="#">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            <span class="fallback-rail-label">More Links</span>
          </a>
          <a class="fallback-rail-link" href="#">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span class="fallback-rail-label">Settings</span>
          </a>
        </nav>
      </aside>

      <main class="fallback-center">
        <div>
          <h1 class="fallback-title">Ragnar</h1>
          <p class="fallback-subtitle">Fast &bull; Sleek &bull; Unlimited Access</p>
        </div>
      </main>

      <footer class="fallback-legal">
        <span>DMCA</span>
        <span>&bull;</span>
        <span>Terms of Service</span>
      </footer>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener("ragnar:app-ready", () => {
        const fallback = document.getElementById("fallback");
        if (fallback) fallback.style.display = "none";
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
