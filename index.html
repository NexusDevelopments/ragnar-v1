<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>Ragnar</title>
    <style>
      body {
        margin: 0;
      }

      #fallback {
        min-height: 100vh;
        position: relative;
        overflow: hidden;
        color: #f4f7ff;
        font-family: "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 20% 25%, rgba(65, 72, 170, 0.1), transparent 36%),
          radial-gradient(circle at 75% 78%, rgba(98, 33, 120, 0.08), transparent 42%),
          linear-gradient(180deg, #04051a, #070a24);
      }

      .fallback-rail {
        position: fixed;
        top: 88px;
        left: 0;
        bottom: 0;
        width: 60px;
        border-right: 1px solid rgba(157, 170, 255, 0.12);
        background: linear-gradient(180deg, rgba(8, 11, 35, 0.55), rgba(5, 7, 24, 0.72));
        display: grid;
        justify-items: center;
        grid-template-rows: auto 1fr;
        padding: 18px 0 16px;
      }

      .fallback-rail-logo {
        width: 30px;
        height: 30px;
        border-radius: 9px;
        display: grid;
        place-items: center;
        font-weight: 700;
        color: #d7e4ff;
        background: linear-gradient(180deg, rgba(140, 160, 255, 0.22), rgba(84, 103, 208, 0.2));
        border: 1px solid rgba(167, 181, 255, 0.36);
        box-shadow: 0 0 16px rgba(108, 128, 236, 0.25);
      }

      .fallback-rail-nav {
        margin-top: 24px;
        display: grid;
        align-content: start;
        gap: 16px;
      }

      .fallback-rail-link {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        font-size: 0.74rem;
        font-weight: 700;
        color: rgba(205, 217, 255, 0.84);
        border: 1px solid rgba(178, 192, 255, 0.16);
        background: rgba(112, 130, 215, 0.08);
      }

      .fallback-center {
        min-height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
        transform: translateY(-28px);
        padding: 20px;
      }

      .fallback-title {
        margin: 0;
        font-size: clamp(2.4rem, 7.2vw, 4.2rem);
        color: #f8faff;
        text-shadow: 0 0 8px rgba(195, 207, 255, 0.46), 0 0 28px rgba(120, 136, 255, 0.28);
      }

      .fallback-subtitle {
        margin: 12px 0 0;
        color: rgba(237, 241, 255, 0.7);
      }

      .fallback-legal {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        color: rgba(196, 205, 238, 0.42);
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <div id="fallback">
      <aside class="fallback-rail" aria-hidden="true">
        <div class="fallback-rail-logo">R</div>
        <div class="fallback-rail-nav">
          <div class="fallback-rail-link">H</div>
          <div class="fallback-rail-link">G</div>
          <div class="fallback-rail-link">B</div>
          <div class="fallback-rail-link">N</div>
          <div class="fallback-rail-link">S</div>
        </div>
      </aside>

      <main class="fallback-center">
        <div>
          <h1 class="fallback-title">Ragnar</h1>
          <p class="fallback-subtitle">Fast • Sleek • Unlimited Access</p>
        </div>
      </main>

      <footer class="fallback-legal">
        <span>DMCA</span>
        <span>•</span>
        <span>Terms of Service</span>
      </footer>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener("ragnar:app-ready", () => {
        const fallback = document.getElementById("fallback");
        if (fallback) {
          fallback.style.display = "none";
        }
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
